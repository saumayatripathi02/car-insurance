name: Semgrep Security Analysis

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'be/**'
      - '.github/workflows/semgrep.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'be/**'

jobs:
  semgrep:
    name: Semgrep Analysis
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          # Scan backend directory
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/nodejs
          generateSarif: false
          scanDir: be/

      # Print results
      - name: Print Semgrep Results
        if: always()
        run: |
          echo "=== Semgrep Analysis Complete ==="
          echo "✓ Backend code scanned for security issues"
          echo "✓ OWASP Top 10 patterns checked"
          echo "✓ Node.js security issues reviewed"
          echo "Check workflow logs for details"
